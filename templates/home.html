<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="page-header">
        <h1>📚 Book Library</h1>
    </header>

    <div class="sort-bar">
    <form method="GET" action="/">
        <label for="sort">Sort by:</label>
        <select name="sort" id="sort" onchange="this.form.submit()">
            <option value="title" {% if current_sort == 'title' %}selected{% endif %}>
                Title (A–Z)
            </option>
            <option value="author" {% if current_sort == 'author' %}selected{% endif %}>
                Author (A–Z)
            </option>
        </select>
    </form>
</div>

    <main class="books-container">
        {% for book, author in books_author_tuple %}
        <div class="book-card">
            <div class="image-container">
                <img
                    src="https://covers.openlibrary.org/b/isbn/{{ book.book_isbn }}-M.jpg"
                    alt="{{ book.book_title }} cover">
            </div>
            <div class="book-info">
                <h3>{{ book.book_title }}</h3>
                <p class="author-name">{{ author.author_name }}</p>
            </div>
        </div>
        {% endfor %}
    </main>

</body>
</html>
