<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="page-header">
    <h1>📚 Book Library</h1>
</header>

<div class="sort-bar">
    <form method="GET" action="/" class="search-form">
        <input
            type="text"
            name="search"
            placeholder="Search books or authors..."
            value="{{ current_search }}">

        <!-- Preserve sorting when searching -->
        <input type="hidden" name="sort" value="{{ current_sort }}">

        <button type="submit">Search</button>
    </form>
    <form method="GET" action="/">
        <label for="sort">Sort by:</label>
        <select name="sort" id="sort" onchange="this.form.submit()">
            <option value="title" {% if current_sort=='title' %}selected{% endif %}>
                Title (A–Z)
            </option>
            <option value="author" {% if current_sort=='author' %}selected{% endif %}>
                Author (A–Z)
            </option>
        </select>
    </form>
</div>

<main class="books-container">
    {% if books_author_tuple %}
    <div class="books-container">
        {% for book, author in books_author_tuple %}
        <div class="book-card">
            <div class="image-container">
                <img
                    src="https://covers.openlibrary.org/b/isbn/{{ book.book_isbn }}-M.jpg"
                    alt="{{ book.book_title }} cover">
            </div>
            <div class="book-info">
                <h3>{{ book.book_title }}</h3>
                <p class="author-name">{{ author.author_name }}</p>
            </div>
        </div>
        <form method="POST"
      action="{{ url_for('delete_book', book_id=book.book_id) }}"
      onsubmit="return confirm('Are you sure you want to delete this book?');">
    <button type="submit" class="delete-btn">
        Delete Book
    </button>
</form>
        {% endfor %}
    </div>
{% else %}
    <div class="no-results">
        <h3>No books found.</h3>
        <p>Try a different search term.</p>
    </div>
{% endif %}
</main>

</body>
</html>
